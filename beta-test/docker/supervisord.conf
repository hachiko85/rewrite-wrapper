; beta-test/docker/supervisord.conf
; supervisord によるマルチプロセス管理設定。
; Multi-process management configuration via supervisord.
;
; ── モデル追加方法 / How to add a model ──
; 1. このファイルに [program:llm-newmodel] セクションを追加する
;    Add a [program:llm-newmodel] section to this file
; 2. backends.docker.yaml に対応エントリを追加する
;    Add a corresponding entry to backends.docker.yaml
; 3. コンテナ外から設定を再読み込み / Reload config from outside the container:
;    docker exec rewrite-wrapper-beta supervisorctl reread
;    docker exec rewrite-wrapper-beta supervisorctl update
;    docker exec rewrite-wrapper-beta supervisorctl restart wrapper
;
; ── モデル停止方法 / How to stop a model ──
;    docker exec rewrite-wrapper-beta supervisorctl stop llm-4b
;
; ── 全プロセス確認 / Check all processes ──
;    docker exec rewrite-wrapper-beta supervisorctl status

; ────────────────────────────────────────────────────────────────
; supervisord メイン設定 / Main supervisord settings
; ────────────────────────────────────────────────────────────────
[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info

; ────────────────────────────────────────────────────────────────
; supervisorctl 通信設定 / supervisorctl socket
; ────────────────────────────────────────────────────────────────
[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ────────────────────────────────────────────────────────────────
; llm-4b: Qwen3.5-4B llama-server (port 8081)
; モデル追加時はこのブロックをコピーして編集する。
; Copy this block and edit to add a new model.
;
; MODEL_FILE はホスト側 MODELS_DIR からの相対パス。
; MODEL_FILE is relative to MODELS_DIR (mounted at /models inside container).
;   例 / e.g.:  "Qwen3.5-4B-GGUF/model.gguf"
;               "unsloth/Qwen3.5-4B.gguf"      ← サブディレクトリも可
;
; マルチモーダル (画像認識) を有効にする場合は MMPROJ_FILE を追加する。
; To enable multimodal (vision), add MMPROJ_FILE to environment.
;   例 / e.g.:  MMPROJ_FILE="clip/mmproj-bf16.gguf"
;
; LD_LIBRARY_PATH:
;   /opt/llama/bin — コンテナ内ビルドの ggml/llama 共有ライブラリ
;                    ggml/llama shared libs from the in-container build
; ────────────────────────────────────────────────────────────────
[program:llm-4b]
command=bash /app/beta-test/docker/scripts/llama-entrypoint.sh
environment=MODEL_FILE="Qwen3.5-4B-GGUF/Qwen3.5-4B-UD-Q4_K_XL.gguf",LLAMA_PORT="8081",N_PARALLEL="4",CTX_SIZE="8192",N_GPU_LAYERS="-1",N_PREDICT="512",LD_LIBRARY_PATH="/opt/llama/bin"
autostart=true
autorestart=true
startretries=3
startsecs=5
stdout_logfile=/app/logs/llm-4b.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=2
stderr_logfile=/app/logs/llm-4b.log
stderr_logfile_maxbytes=0

; ────────────────────────────────────────────────────────────────
; llm-0-8b: Qwen3.5-0.8B llama-server (port 8082)
; ────────────────────────────────────────────────────────────────
[program:llm-0-8b]
command=bash /app/beta-test/docker/scripts/llama-entrypoint.sh
environment=MODEL_FILE="Qwen3.5-0.8B-GGUF/Qwen3.5-0.8B-UD-Q4_K_XL.gguf",LLAMA_PORT="8082",N_PARALLEL="8",CTX_SIZE="8192",N_GPU_LAYERS="-1",N_PREDICT="512",LD_LIBRARY_PATH="/opt/llama/bin"
autostart=true
autorestart=true
startretries=3
startsecs=5
stdout_logfile=/app/logs/llm-0-8b.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=2
stderr_logfile=/app/logs/llm-0-8b.log
stderr_logfile_maxbytes=0

; ────────────────────────────────────────────────────────────────
; wrapper: Bun + Hono プロキシサーバー (port from env)
; ────────────────────────────────────────────────────────────────
[program:wrapper]
command=bun run start
directory=/app
; MONGO_URI は network_mode:host により localhost でホストの MongoDB に接続
; MONGO_URI connects to host MongoDB via localhost (network_mode: host)
environment=MONGO_URI="%(ENV_MONGO_URI)s",MASTER_KEY="%(ENV_MASTER_KEY)s",BACKENDS_CONFIG="%(ENV_BACKENDS_CONFIG)s",PORT="%(ENV_PORT)s"
autostart=true
autorestart=true
startretries=5
startsecs=15
stdout_logfile=/app/logs/wrapper.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=2
stderr_logfile=/app/logs/wrapper.log
stderr_logfile_maxbytes=0
